<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your CRM Audit Report | agent7d</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #e11d48;
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1f1f1f;
    --text: #f5f5f5;
    --muted: #9ca3af;
    --font: 'Plus Jakarta Sans', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); }

  nav { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; text-decoration: none; color: var(--text); }
  .logo span { color: var(--primary); }

  .report-wrap { max-width: 800px; margin: 0 auto; padding: 48px 24px 100px; }

  /* HEADER */
  .report-header { margin-bottom: 48px; }
  .company-meta { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }

  /* SCORE + LEAKAGE */
  .score-leakage { display: flex; gap: 20px; margin-bottom: 40px; }
  .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px 32px; flex: 0 0 auto; text-align: center; }
  .score-num { font-size: 56px; font-weight: 800; line-height: 1; }
  .score-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .leakage-card { flex: 1; background: rgba(225,29,72,0.06); border: 1px solid rgba(225,29,72,0.25); border-radius: 16px; padding: 24px 28px; }
  .leakage-tag { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .leakage-amount { font-size: 48px; font-weight: 800; color: var(--primary); letter-spacing: -0.02em; line-height: 1; }
  .leakage-desc { font-size: 13px; color: var(--muted); margin-top: 6px; }

  /* SECTIONS */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; margin-bottom: 20px; }
  .section h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  /* GRADES */
  .grade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grade-item { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
  .grade-val { font-size: 32px; font-weight: 800; }
  .grade-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ISSUES */
  .issue-list { list-style: none; }
  .issue-list li { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .issue-list li:last-child { border: none; }
  .issue-list li::before { content: "✗"; color: var(--primary); font-weight: 700; flex-shrink: 0; margin-top: 2px; }

  /* QUICK WINS */
  .qw-item { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .qw-item:last-child { border: none; }
  .qw-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 8px; }
  .qw-title { font-weight: 700; font-size: 15px; }
  .qw-impact { color: var(--primary); font-weight: 800; font-size: 15px; white-space: nowrap; }
  .effort-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .effort-Low { background: rgba(16,185,129,0.15); color: #10b981; }
  .effort-Medium { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .effort-High { background: rgba(239,68,68,0.15); color: #ef4444; }
  .qw-steps { padding-left: 16px; margin-top: 8px; }
  .qw-steps li { font-size: 13px; color: var(--muted); padding: 3px 0; }

  /* NARRATIVE */
  .narrative { font-size: 15px; line-height: 1.8; color: #d1d5db; }

  /* LOCKED */
  .locked-section { background: var(--surface); border: 1px solid rgba(225,29,72,0.3); border-radius: 16px; padding: 28px 32px; margin-bottom: 20px; position: relative; overflow: hidden; }
  .locked-section::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--primary); }
  .locked-inner { filter: blur(4px); pointer-events: none; user-select: none; opacity: 0.5; }
  .locked-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .lock-icon { font-size: 32px; margin-bottom: 12px; }
  .lock-cta-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .lock-cta-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; max-width: 360px; }

  /* PAYMENT CTA */
  .payment-cta { background: var(--primary); border-radius: 16px; padding: 36px 40px; text-align: center; margin-top: 32px; }
  .payment-cta h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .payment-cta p { color: rgba(255,255,255,0.75); margin-bottom: 24px; font-size: 15px; }
  .btn-white { background: #fff; color: var(--primary); border: none; padding: 16px 36px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; font-family: var(--font); text-decoration: none; display: inline-block; }
  .btn-white:hover { opacity: 0.93; }
  .included-list { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 20px; }
  .included-item { background: rgba(255,255,255,0.12); border-radius: 999px; padding: 5px 14px; font-size: 12px; font-weight: 600; }

  /* ERROR / LOADING */
  .state-msg { text-align: center; padding: 80px 24px; }
  .state-msg h2 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
  .state-msg p { color: var(--muted); }
</style>
</head>
<body>

<nav>
  <a href="/tools/crm-audit/" class="logo">agent<span>7</span>d</a>
  <span style="font-size:13px;color:var(--muted)" id="navLabel">Your CRM Report</span>
</nav>

<div class="report-wrap" id="reportWrap">
  <div class="state-msg">
    <div style="font-size:40px;margin-bottom:20px">⏳</div>
    <h2>Loading your report...</h2>
    <p>Retrieving your audit results.</p>
  </div>
</div>

<script>
const API_BASE = "https://crm-audit-api.onrender.com";

const params = new URLSearchParams(location.search);
const auditId = params.get("id");

function gradeColor(g) {
  return { A: "#10b981", B: "#3b82f6", C: "#f59e0b", D: "#ef4444", F: "#dc2626" }[g] || "#9ca3af";
}

function fmt(n) {
  return "$" + Number(n || 0).toLocaleString();
}

async function loadReport() {
  if (!auditId) {
    showError("No audit ID found. Please run a new audit.");
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/audit/${auditId}`);
    if (!res.ok) throw new Error("Report not found");
    const meta = await res.json();

    // Fetch full audit data for display (audit route returns preview fields)
    // We use the meta + partial data from the audit preview
    renderReport(meta);
  } catch (err) {
    showError(err.message);
  }
}

function renderReport(data) {
  const wrap = document.getElementById("reportWrap");
  const a = data.audit_preview || data;
  const isPaid = data.paid;

  // Build score color
  const score = a.score || 0;
  const scoreColor = score >= 70 ? "#10b981" : score >= 50 ? "#f59e0b" : "#e11d48";

  wrap.innerHTML = `
    <!-- HEADER -->
    <div class="report-header">
      <div class="company-meta">${data.companyName || "Your Company"} · Monday.com CRM Audit</div>
      <h1>CRM Health Report</h1>
      <div style="font-size:13px;color:var(--muted)">Report ID: ${auditId} · Generated ${new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
    </div>

    <!-- SCORE + LEAKAGE -->
    <div class="score-leakage">
      <div class="score-card">
        <div class="score-num" style="color:${scoreColor}">${score}</div>
        <div class="score-label">Health Score<br>/100</div>
      </div>
      <div class="leakage-card">
        <div class="leakage-tag">💰 Estimated Annual Revenue Leakage</div>
        <div class="leakage-amount">${fmt(a.revenue_leakage)}</div>
        <div class="leakage-desc">Based on pipeline stagnation, data gaps, and missed automation opportunities in your Monday.com boards.</div>
      </div>
    </div>

    <!-- GRADES -->
    <div class="section">
      <h2>System Health Grades</h2>
      <div class="grade-grid">
        <div class="grade-item">
          <div class="grade-val" style="color:${gradeColor(a.data_quality_grade)}">${a.data_quality_grade || "?"}</div>
          <div class="grade-label">Data Quality</div>
        </div>
        <div class="grade-item">
          <div class="grade-val" style="color:${gradeColor(a.pipeline_health_grade)}">${a.pipeline_health_grade || "?"}</div>
          <div class="grade-label">Pipeline Health</div>
        </div>
      </div>
    </div>

    <!-- CRITICAL ISSUES -->
    <div class="section">
      <h2>Critical Findings</h2>
      <ul class="issue-list">
        ${(a.critical_issues || []).map(i => `<li>${i}</li>`).join("")}
      </ul>
    </div>

    <!-- NARRATIVE -->
    <div class="section">
      <h2>Executive Summary</h2>
      <div class="narrative">${(a.narrative || "").replace(/\n/g,"<br>")}</div>
    </div>

    <!-- QUICK WINS (3 free) -->
    <div class="section">
      <h2>Top Quick Wins (Preview — 3 of 10)</h2>
      ${(a.quick_wins_preview || []).map((w, i) => `
        <div class="qw-item">
          <div class="qw-header">
            <div class="qw-title">${i+1}. ${w.title}</div>
            <div class="qw-impact">+${fmt(w.impact_usd)}/yr</div>
          </div>
        </div>`).join("")}
    </div>

    <!-- LOCKED: MORE QUICK WINS -->
    ${!isPaid ? `
    <div class="locked-section" style="min-height:240px">
      <div class="locked-inner">
        <h2>Quick Wins #4–10</h2>
        <div class="qw-item"><div class="qw-header"><div class="qw-title">4. Set up automated deal-stage notifications</div><div class="qw-impact">+$8,400/yr</div></div></div>
        <div class="qw-item"><div class="qw-header"><div class="qw-title">5. Create weekly stale-deal digest</div><div class="qw-impact">+$6,200/yr</div></div></div>
        <div class="qw-item"><div class="qw-header"><div class="qw-title">6. Enforce required fields at creation</div><div class="qw-impact">+$5,800/yr</div></div></div>
      </div>
      <div class="locked-overlay">
        <div class="lock-icon">🔒</div>
        <div class="lock-cta-title">7 More Quick Wins + Full Report</div>
        <div class="lock-cta-sub">Plus automation gap analysis, 90-day roadmap, and a 20+ page PDF you can share with your team.</div>
        <button class="btn-white" onclick="unlockReport()" style="background:var(--primary);color:#fff">Unlock Full Report — $299 →</button>
      </div>
    </div>

    <div class="payment-cta">
      <h2>Unlock Your Complete CRM Transformation Plan</h2>
      <p>The free report shows you what's broken. The full report tells you exactly how to fix it — and how much revenue you'll get back.</p>
      <button class="btn-white" onclick="unlockReport()">Get Full Report for $299 →</button>
      <div class="included-list">
        <div class="included-item">✓ 10 Quick Wins</div>
        <div class="included-item">✓ Automation Gaps</div>
        <div class="included-item">✓ 90-Day Roadmap</div>
        <div class="included-item">✓ PDF Download</div>
        <div class="included-item">✓ Delivered to your email</div>
      </div>
    </div>
    ` : `
    <div class="section" style="border-color:rgba(16,185,129,0.3)">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <span style="font-size:24px">✅</span>
        <h2 style="margin:0">Full Report Unlocked</h2>
      </div>
      <p style="color:var(--muted);margin-bottom:20px">Your complete 20+ page report has been sent to your email.</p>
      <a href="#" id="pdfLink" class="btn-white" style="background:var(--primary);color:#fff;padding:14px 28px;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;display:inline-block">Download PDF Report →</a>
    </div>
    `}
  `;

  if (isPaid) {
    document.getElementById("pdfLink").href = `${API_BASE}/api/pdf/preview/${auditId}`;
  }

  document.getElementById("navLabel").textContent = (data.companyName || "Your") + " · CRM Report";
}

async function unlockReport() {
  const btn = event.currentTarget;
  btn.textContent = "Loading...";
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/payment/checkout`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ auditId }),
    });
    if (!res.ok) throw new Error("Could not create checkout");
    const { checkoutUrl } = await res.json();
    window.location.href = checkoutUrl;
  } catch (err) {
    alert(err.message);
    btn.textContent = "Unlock Full Report — $299 →";
    btn.disabled = false;
  }
}

function showError(msg) {
  document.getElementById("reportWrap").innerHTML = `
    <div class="state-msg">
      <div style="font-size:40px;margin-bottom:20px">❌</div>
      <h2>Something went wrong</h2>
      <p>${msg}</p>
      <a href="/tools/crm-audit/" style="color:var(--primary);text-decoration:none;display:inline-block;margin-top:20px">← Run a new audit</a>
    </div>`;
}

loadReport();
</script>

</body>
</html>
